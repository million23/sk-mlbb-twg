# Full login flow: Home -> Login page -> Authenticated app shell
# Uses inline flow env values (Maestro Studio friendly, no OS env needed)
url: http://localhost:1023
name: Login E2E Flow
tags:
  - auth
  - web
  - e2e
env:
  # MAESTRO_LOGIN_EMAIL:
  # MAESTRO_LOGIN_PASSWORD: 
---
# Start app (may land on Home or Dashboard if auth cookie exists)
- launchApp

# If already authenticated, sign out first so this remains a true login test
- runFlow:
    when:
      visible: Dashboard
    commands:
      - tapOn: Sign out
      - assertVisible: Sign out?
      - tapOn: Sign out

# If on Home page, proceed to login
- runFlow:
    when:
      visible: SK MLBB Tournament Tracker
    commands:
      - tapOn: Admin login

# Login form checks
- assertVisible: Login to Admin Panel
- assertVisible: Email
- assertVisible: Password
- assertVisible: Login

# Fill and submit credentials
- tapOn:
    id: email
- inputText: ${MAESTRO_LOGIN_EMAIL}
- tapOn:
    id: password
- inputText: ${MAESTRO_LOGIN_PASSWORD}
- tapOn: Login

# Post-login checks (dashboard layout)
- extendedWaitUntil:
    visible: Dashboard
    timeout: 15000
- assertVisible: Participants
- assertVisible: Teams
- takeScreenshot: login-flow-success
